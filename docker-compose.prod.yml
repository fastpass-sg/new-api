# Production docker-compose for new-api
#
# Usage:
#   ./scripts/deploy.sh    # first-time install or re-run (idempotent)
#   ./scripts/upgrade.sh   # pull newer images and restart
#
# This file expects a .env file next to it. Generate one via:
#   ./scripts/gen-env.sh
#
# Only the nginx service publishes ports to 0.0.0.0 (80, 443).
# All other services bind to 127.0.0.1 so they cannot be reached
# from outside the host.
#
# Layout:
#   Deploy dir (this directory, e.g. /data/newapi):
#     - docker-compose.prod.yml, scripts/, .env
#     - nginx/conf.d/ (tracked templates + rendered new-api.conf)
#   Data dir (${DATA_ROOT}, default /data/newapi_data):
#     - app/, logs/, postgres/, redis/   (application + db state)
#     - nginx/certs/, nginx/www/, nginx/logs/  (runtime, not source)
# DATA_ROOT is read from .env; override there if you want a different path.

services:
  new-api:
    image: ${NEW_API_IMAGE:-calciumion/new-api:latest}
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    expose:
      - "3000"
    volumes:
      - ${DATA_ROOT:-/data/newapi_data}/app:/data
      - ${DATA_ROOT:-/data/newapi_data}/logs:/app/logs
    environment:
      - SQL_DSN=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_CONN_STRING=redis://:${REDIS_PASSWORD}@redis:6379
      - SESSION_SECRET=${SESSION_SECRET}
      - CRYPTO_SECRET=${CRYPTO_SECRET:-}
      - TZ=${TZ:-Asia/Shanghai}
      - NODE_NAME=${NODE_NAME:-new-api-node-1}
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:15-alpine
    container_name: new-api-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ${DATA_ROOT:-/data/newapi_data}/postgres:/var/lib/postgresql/data
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: new-api-redis
    restart: always
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --appendonly
      - "yes"
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ${DATA_ROOT:-/data/newapi_data}/redis:/data
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}

  nginx:
    image: nginx:1.27-alpine
    container_name: new-api-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ${DATA_ROOT:-/data/newapi_data}/nginx/certs:/etc/letsencrypt:ro
      - ${DATA_ROOT:-/data/newapi_data}/nginx/www:/var/www/certbot:ro
      - ${DATA_ROOT:-/data/newapi_data}/nginx/logs:/var/log/nginx
    depends_on:
      new-api:
        condition: service_healthy
    networks:
      - new-api-network
    # Reload nginx every 6h so renewed certificates take effect without restart.
    command: /bin/sh -c "while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;'"

  # Let's Encrypt auto-renewal. Disabled by default (BYO certificate mode).
  # Enable by setting CERT_MODE=letsencrypt in .env; deploy.sh / upgrade.sh
  # then start this service via `docker compose --profile letsencrypt up -d`.
  certbot:
    image: certbot/certbot:latest
    container_name: new-api-certbot
    restart: always
    profiles: [letsencrypt]
    volumes:
      - ${DATA_ROOT:-/data/newapi_data}/nginx/certs:/etc/letsencrypt
      - ${DATA_ROOT:-/data/newapi_data}/nginx/www:/var/www/certbot
    networks:
      - new-api-network
    # Try to renew every 12h. certbot itself no-ops if not yet due.
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

networks:
  new-api-network:
    driver: bridge
