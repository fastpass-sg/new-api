# Always-on HTTP listener.
#
# Two jobs:
#   1. Serve the ACME http-01 challenge so certbot can issue / renew certs.
#   2. Redirect everything else to HTTPS.
#
# This file is committed and stays loaded regardless of whether a certificate
# has been issued yet.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
